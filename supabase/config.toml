# Google Apps Script (Application Sheet Lumina) cannot send Supabase JWTs;
# sheet-apps-receiver authenticates via the SHEET_SYNC_SECRET header instead.
[functions.sheet-apps-receiver]
verify_jwt = false

# LuminaTaskOS — all taskos functions set verify_jwt=false and do their OWN auth
# inside (webhook: secret-token; process-inbox: internal key; link/query:
# getUser() + staff check). The platform JWT gate is disabled because it rejects
# the CORS preflight/POST for browser invokes; security is enforced in-function.
[functions.taskos-telegram-webhook]
verify_jwt = false

[functions.taskos-telegram-setup]
verify_jwt = false

[functions.taskos-process-inbox]
verify_jwt = false

