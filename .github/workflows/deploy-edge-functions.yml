name: Migrate edge functions to new Supabase

# Deploys all application edge functions to the new self-owned Supabase project
# and transfers their secrets from the old (Lovable Cloud) project. Runs on
# GitHub's servers so it can be triggered remotely — no local terminal needed.
#
# One-time setup (you): add a repository secret named SUPABASE_ACCESS_TOKEN
#   (Supabase dashboard -> Account -> Access Tokens -> Generate new token).
# Then this workflow can be run from the Actions tab (or triggered for you).

on:
  workflow_dispatch:

jobs:
  migrate-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      NEW_REF: gkghazemorbxmzzcbaty
      OLD_FUNC_URL: https://geovwgfbbfhhmommyasj.supabase.co/functions/v1/migrate-export
      OLD_ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdlb3Z3Z2ZiYmZoaG1vbW15YXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjc5NDIsImV4cCI6MjA4MjYwMzk0Mn0.Z7tsDUOEndwt8du4zdTK810oBWt1Y3JiYNkwcyRggak
      MIG_KEY: lumina-pub-2026-v2-rotate
      DUMP_TOKEN: eb00143ad408f640f9505c8ce22d9676f702d10d743cecc2f674ec537f2abf23
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require the access token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Add a repository secret named SUPABASE_ACCESS_TOKEN first."
            echo "Supabase dashboard -> Account -> Access Tokens -> Generate new token."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy application edge functions
        run: |
          set -euo pipefail
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            case "$name" in
              _shared|migrate-export|migrate-import-storage) continue ;;
            esac
            echo "==> Deploying $name"
            supabase functions deploy "$name" --project-ref "$NEW_REF"
          done

      - name: Transfer function secrets (old -> new, values never logged)
        run: |
          set -euo pipefail
          curl -fsS -X POST "$OLD_FUNC_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OLD_ANON" \
            -H "apikey: $OLD_ANON" \
            -H "x-migration-key: $MIG_KEY" \
            -H "x-dump-token: $DUMP_TOKEN" \
            -d '{"action":"dump-secrets"}' > /tmp/s.json
          node -e '
            const o = require("/tmp/s.json");
            if (!o || !o.secrets) { console.error("No secrets returned — is dump-secrets deployed in Lovable?"); process.exit(1); }
            const fs = require("fs");
            fs.writeFileSync("/tmp/s.env", Object.entries(o.secrets).map(([k,v]) => k + "=" + v).join("\n") + "\n");
            console.error("Transferring " + Object.keys(o.secrets).length + " secrets.");
          '
          supabase secrets set --project-ref "$NEW_REF" --env-file /tmp/s.env
          rm -f /tmp/s.json /tmp/s.env
          echo "✅ Functions deployed and secrets set on $NEW_REF."
