name: Deploy edge functions

# Deploys ALL Supabase edge functions from the committed repo source via the
# Supabase CLI (which reads files directly and honours per-function verify_jwt
# in supabase/config.toml). Idempotent — safe to re-run. Manual trigger:
#   gh workflow run deploy-functions.yml --ref <branch>
# Requires repo secret SUPABASE_ACCESS_TOKEN (already configured).

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: gkghazemorbxmzzcbaty
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require the access token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Add a repository secret named SUPABASE_ACCESS_TOKEN first."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all application edge functions
        run: |
          set -euo pipefail
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            case "$name" in
              _shared|migrate-export|migrate-import-storage) continue ;;
            esac
            echo "==> Deploying $name"
            supabase functions deploy "$name" --project-ref "$PROJECT_REF"
          done
          echo "✅ All edge functions deployed from repo source."
