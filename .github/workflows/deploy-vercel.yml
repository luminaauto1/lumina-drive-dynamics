name: Deploy site to Vercel

# Builds the frontend and deploys it to Vercel from GitHub's servers, pointing
# at the new self-owned Supabase project. No local terminal needed.
#
# One-time setup (you): add a repository secret named VERCEL_TOKEN
#   (vercel.com -> Account Settings -> Tokens -> Create). Then trigger this.
#
# The VITE_* values below are build-time public values (anon key, project URL,
# browser Maps key) — safe to keep in the workflow.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'vercel.json'
      - '.github/workflows/deploy-vercel.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Public project identifiers — required by Vercel CLI v50+ for non-interactive CI deploys.
      VERCEL_ORG_ID: team_pEq6NR4dRmtM7zcNeeTpROcq
      VERCEL_PROJECT_ID: prj_dw5xEJnNK0yFD4i8mEbhEbvfyeyz
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require the Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::No VERCEL_TOKEN secret set yet — skipping deploy."
            echo "Add it at GitHub -> Settings -> Secrets and variables -> Actions."
            exit 0
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm i -g vercel@32

      - name: Deploy to Vercel (production)
        if: env.VERCEL_TOKEN != ''
        run: |
          set -euo pipefail
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" \
            --build-env VITE_SUPABASE_URL="https://gkghazemorbxmzzcbaty.supabase.co" \
            --build-env VITE_SUPABASE_PUBLISHABLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZ2hhemVtb3JieG16emNiYXR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODEwMTQsImV4cCI6MjA5Njg1NzAxNH0.3ZTKnEjaD374VAGOWynmdaSFgghW5fxo-8PDNF1WM_4" \
            --build-env VITE_SUPABASE_PROJECT_ID="gkghazemorbxmzzcbaty" \
            --build-env VITE_GOOGLE_MAPS_API_KEY="AIzaSyAzIpJyiSzVJwx9DrMPXHbHAS7tV_X76Lw" \
            | tee /tmp/vercel.out
          echo "----------------------------------------------"
          echo "DEPLOYED_URL=$(tail -n1 /tmp/vercel.out)"
          echo "----------------------------------------------"
