<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      ============================================================
      SECURITY HEADERS (meta-tag layer)
      ============================================================
      NOTE: Browsers honor only a subset of security headers via
      <meta http-equiv>. The following are IGNORED in meta tags and
      MUST be set as real HTTP response headers on the hosting/CDN
      layer (Lovable hosting handles this for the published app):
        - Strict-Transport-Security
        - X-Frame-Options
        - Permissions-Policy
      The headers below ARE honored via meta and are applied here.
    -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      Tailored Content-Security-Policy.
      Deployed in REPORT-ONLY mode first per the zero-breakage mandate
      so any violations are logged to the browser console without
      blocking the request. Once verified clean in production, switch
      `Content-Security-Policy-Report-Only` -> `Content-Security-Policy`
      to enforce.

      Allowed third-party origins map to the integrations the app uses:
        - Supabase (REST + Realtime over WebSocket + Storage)
        - EmailJS (transactional emails via REST)
        - Google Maps / Places / Geocoding
        - Google Tag Manager / Google Analytics
        - Google Fonts
        - Lovable preview + published domains (gpteng.co for tagger)
    -->
    <meta
      http-equiv="Content-Security-Policy-Report-Only"
      content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        frame-ancestors 'self';
        form-action 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval'
          https://www.googletagmanager.com
          https://www.google-analytics.com
          https://maps.googleapis.com
          https://maps.gstatic.com
          https://cdn.gpteng.co;
        script-src-elem 'self' 'unsafe-inline'
          https://www.googletagmanager.com
          https://www.google-analytics.com
          https://maps.googleapis.com
          https://maps.gstatic.com
          https://cdn.gpteng.co;
        connect-src 'self'
          https://*.supabase.co wss://*.supabase.co
          https://*.supabase.in wss://*.supabase.in
          https://api.emailjs.com https://*.emailjs.com
          https://maps.googleapis.com https://maps.gstatic.com
          https://www.google-analytics.com
          https://*.google-analytics.com
          https://*.analytics.google.com
          https://www.googletagmanager.com
          https://*.lovable.app https://*.lovable.dev;
        img-src 'self' data: blob:
          https://*.supabase.co
          https://maps.gstatic.com https://maps.googleapis.com
          https://*.googleapis.com https://*.ggpht.com
          https://www.google-analytics.com
          https://www.googletagmanager.com;
        media-src 'self' blob: https://*.supabase.co;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' data: https://fonts.gstatic.com;
        worker-src 'self' blob:;
        frame-src 'self' https://www.google.com https://*.googleapis.com;
        manifest-src 'self';
        upgrade-insecure-requests;
      "
    />

    <title>Lumina Auto | Quality Pre-Owned Vehicles & Finance</title>
    <meta
      name="description"
      content="Pretoria's trusted dealership for all makes and models. We specialize in vehicle sourcing, bank-approved financing, and premium pre-owned sales."
    />
    <meta property="og:title" content="Lumina Auto | Quality Pre-Owned Vehicles & Finance" />
    <meta
      property="og:description"
      content="Pretoria's trusted dealership for all makes and models. We specialize in vehicle sourcing, bank-approved financing, and premium pre-owned sales."
    />
    <meta property="og:type" content="website" />
    <meta
      name="keywords"
      content="car sales, vehicle finance, car sourcing, pre-owned vehicles, Pretoria, South Africa, luxury cars, auto dealership"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://luminaauto.co.za/" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <meta name="theme-color" content="#000000" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YOUR_MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RNS640RTNG', { send_page_view: false });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
